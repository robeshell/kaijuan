name: kaika
description: "Kaika — a local reader for page-image and reflow content."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Persistence
  drift: ^2.34.1
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Import & identity
  file_selector: ^1.1.0
  crypto: ^3.0.7
  archive: ^4.0.7

  package_info_plus: ^10.2.1

  # Book reader
  image: ^4.1.7
  flutter_inappwebview: ^6.2.0-beta.3
  url_launcher: ^6.3.1
  pointer_interceptor: ^0.10.1+2
  share_plus: ^13.2.1
  gal: ^2.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.1
  drift_dev: ^2.34.2+1
  flutter_lints: ^6.0.0

dependency_overrides:
  # Upstream 1.2.0-beta.3 declares macOS 10.14 while using APIs available
  # from 10.15. Keep the Apache-2.0 package local until the fix is released.
  flutter_inappwebview_macos:
    path: third_party/flutter_inappwebview_macos

flutter:
  uses-material-design: true
  assets:
    - assets/book/FOLIATE_UPSTREAM_LICENSE
    - assets/book/UPSTREAM_ATTRIBUTION.md
    - assets/book/foliate-js/index.html
    - assets/book/foliate-js/metadata-probe.html
    - assets/book/foliate-js/dist/
    - assets/book/foliate-js/src/
    - assets/book/foliate-js/src/vendor/
    - assets/book/foliate-js/src/vendor/pdfjs/
    - assets/book/foliate-js/src/vendor/prism/
    - assets/book/foliate-js/src/vendor/prism/components/
    - assets/book/foliate-js/src/vendor/prism/themes/
