name: kaika
description: "Kaika — a local reader for page-image and reflow content."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Persistence
  drift: ^2.34.1
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Import & identity
  file_selector: ^1.1.0
  crypto: ^3.0.7
  archive: ^4.0.7

  package_info_plus: ^10.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.1
  drift_dev: ^2.34.2+1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
