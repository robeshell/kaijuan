name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache build_runner output
        uses: actions/cache@v5
        with:
          path: .dart_tool/build
          key: build-runner-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}-${{ hashFiles('lib/**.dart', 'test/**.dart') }}
          restore-keys: |
            build-runner-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}-
            build-runner-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test
